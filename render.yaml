databases:
  - name: facedetect-db
    databaseName: facedetect
    user: faceuser
    plan: free

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: facedetect-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: facedetect-db
          property: connectionString

  # ── Frontend (React Static Site) ─────────────────────────────────────────
  - type: web
    name: facedetect-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: facedetect-backend
          type: web
          property: hostWithScheme

